<div class="admin-container">

  <div class="admin-header">
    <h1 class="admin-title">Image Repository</h1>

    <label class="btn-add" [class.disabled]="isUploading">
      <span class="btn-icon" *ngIf="!isUploading">+</span>
      <span class="btn-text">{{ isUploading ? 'Uploading ' + uploadProgress + '%' : 'Add New Image' }}</span>
      <input type="file" accept="image/*" (change)="onFileSelected($event)" [disabled]="isUploading"
        style="display: none;" />
    </label>
  </div>

  <div class="progress-container" *ngIf="isUploading">
    <div class="progress-bar-wrapper">
      <div class="progress-bar-fill" [style.width.%]="uploadProgress"></div>
    </div>
    <span class="progress-text">Uploading: {{ uploadProgress }}%</span>
  </div>

  <div class="filter-bar">
    <div class="search-box">
      <span class="search-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </span>
      <input type="text" placeholder="Search images..." class="search-input">
    </div>
    <div class="filter-group">
      <span class="filter-label">Status</span>
      <div class="status-toggle">
        <button class="status-btn active">All</button>
        <button class="status-btn">Public</button>
        <button class="status-btn">Draft</button>
      </div>
    </div>
    <select class="form-select select-category">
      <option>Category</option>
    </select>
    <input type="text" placeholder="Date Range" class="form-input input-date">
    <select class="form-select select-sort">
      <option>Sort By</option>
    </select>
  </div>

  <div class="image-grid">
    <div *ngFor="let img of images" class="image-card">

      <div class="image-thumb-wrapper">
        <img [src]="img.imageUrl" [alt]="img.fileName" class="image-thumb">

        <div class="image-overlay">
          <div class="action-box">
            <button (click)="onUpdate(img.id)" class="action-btn btn-update">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
              </svg>
              <span>Update</span>
            </button>
            <button (click)="onDelete(img.id)" class="action-btn btn-delete">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
              <span>Delete</span>
            </button>
          </div>
        </div>
      </div>

      <div class="image-info">
        <h3 class="image-name" [title]="img.fileName">{{ img.fileName }}</h3>
        <div class="image-meta">
          <span class="meta-format">{{ getFileFormat(img.fileName) }}</span>
          <span class="meta-divider">|</span>
          <span [title]="img.phash">pHash: {{ img.phash ? (img.phash | slice:0:8) + '...' : 'N/A' }}</span>
        </div>

        <div class="image-footer">
          <span>Upload: {{ img.createdAt | date: 'dd/MM/yyyy HH:mm:ss'}} </span>
          <!-- <span class="author-name">Author: <strong>Admin</strong></span> -->
        </div>
      </div>

    </div>
  </div>

  <div class="pagination" *ngIf="images.length > 0">
    <button class="page-btn page-nav">Previous</button>
    <button class="page-btn page-num active">1</button>
    <button class="page-btn page-num">2</button>
    <button class="page-btn page-num">3</button>
    <button class="page-btn page-nav">Next</button>
  </div>

</div>

<div class="modal-backdrop" *ngIf="showUpdateModel">
  <div class="update-modal">
    <button class="modal-close" (click)="closeModal()"> ✕ </button>

    <h2>Chỉnh sửa ảnh</h2>

    <div class="form-group">
      <label>Tên file</label>
      <input type="text" [(ngModel)]="selectedImage.fileName">
    </div>

    <div class="form-group">
      <label>Đường dẫn</label>
      <input type="text" [(ngModel)]="selectedImage.filePath">
    </div>

    <div class="form-group">
      <label>pHash</label>
      <input type="text" [(ngModel)]="selectedImage.phash">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" (click)="closeModal()">
        Hủy
      </button>

      <button class="btn-save" (click)="saveUpdate()">
        Lưu thay đổi
      </button>

    </div>
  </div>
</div>
